<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca — Iniciar sesión</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-left">
      <div class="login-decor"><i class="ti ti-books"></i></div>
      <h1>Sistema de Control de Biblioteca</h1>
      <p>Gestión de catálogo, préstamos y usuarios en un solo lugar.</p>
    </div>
    <div class="login-right">
      <div class="login-form-wrap">
        <h2>Bienvenido</h2>
        <p>Ingresa tus credenciales para continuar</p>
        <div class="login-error" id="loginError"></div>
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="nombre de usuario" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary login-btn" id="loginBtn" onclick="doLogin()">
          <i class="ti ti-login"></i> Iniciar sesión
        </button>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (getToken()) {
      window.location.href = resolvePageUrl(isAdmin() ? 'admin-dashboard.html' : 'usuario.html');
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      err.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Ingresando…';
      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });
        setSession(data);
        window.location.href = resolvePageUrl(isAdmin() ? 'admin-dashboard.html' : 'usuario.html');
      } catch (e) {
        err.textContent = e.detail || 'Credenciales incorrectas';
        err.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-login"></i> Iniciar sesión';
      }
    }
  </script>
</body>
</html>
