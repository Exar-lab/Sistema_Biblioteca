<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Categorías — Biblioteca</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
</head>
<body>
<div class="app">
  <div id="sidebar-root"></div>
  <div class="main">
    <header class="topbar">
      <span class="topbar-title">Categorías</span>
      <button class="btn btn-primary btn-sm" onclick="openModal()"><i class="ti ti-plus"></i> Nueva categoría</button>
    </header>
    <div class="content">
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nombre</th><th>Descripción</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody id="listBody"><tr><td colspan="4" class="loading">Cargando…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="itemModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nueva categoría</span>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-grid">
      <div class="form-group form-full"><label>Nombre *</label><input id="fName" placeholder="Nombre de la categoría"/></div>
      <div class="form-group form-full"><label>Descripción</label><textarea id="fDesc" placeholder="Descripción opcional…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveItem()"><i class="ti ti-device-floppy"></i> Guardar</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
  requireAdmin();
  renderSidebar('categorias');
  let allItems = [], editingId = null;

  async function loadAll() {
    allItems = await apiFetch('/categories/');
    renderList(allItems);
  }

  function renderList(list) {
    const tbody = document.getElementById('listBody');
    if (!list.length) { tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><i class="ti ti-tags"></i><p>No hay categorías</p></div></td></tr>'; return; }
    tbody.innerHTML = list.map(c => `
      <tr>
        <td><strong style="color:var(--text)">${c.name}</strong></td>
        <td>${c.description || '—'}</td>
        <td><span class="badge ${c.is_active?'badge-active':'badge-inactive'}">${c.is_active?'Activa':'Inactiva'}</span></td>
        <td><div style="display:flex;gap:6px;">
          <button class="btn-icon" onclick="openModal(${c.id})"><i class="ti ti-edit"></i></button>
          <button class="btn-icon danger" onclick="deleteItem(${c.id},'${c.name}')"><i class="ti ti-trash"></i></button>
        </div></td>
      </tr>`).join('');
  }

  function openModal(id = null) {
    editingId = id;
    document.getElementById('fName').value = '';
    document.getElementById('fDesc').value = '';
    document.getElementById('modalTitle').textContent = id ? 'Editar categoría' : 'Nueva categoría';
    if (id) {
      const c = allItems.find(x => x.id === id);
      document.getElementById('fName').value = c.name;
      document.getElementById('fDesc').value = c.description || '';
    }
    document.getElementById('itemModal').classList.add('open');
  }

  function closeModal() { document.getElementById('itemModal').classList.remove('open'); }

  async function saveItem() {
    const name = document.getElementById('fName').value.trim();
    if (!name) { showToast('El nombre es obligatorio','warning'); return; }
    const payload = { name, description: document.getElementById('fDesc').value.trim() || null, is_active: true };
    try {
      if (editingId) { await apiFetch(`/categories/${editingId}`, { method:'PATCH', body: JSON.stringify(payload) }); showToast('Categoría actualizada'); }
      else { await apiFetch('/categories/', { method:'POST', body: JSON.stringify(payload) }); showToast('Categoría creada'); }
      closeModal();
      allItems = await apiFetch('/categories/');
      renderList(allItems);
    } catch(e) { showToast(e.detail||'Error','error'); }
  }

  function deleteItem(id, name) {
    confirm('Eliminar categoría', `¿Eliminar "${name}"?`, async () => {
      try { await apiFetch(`/categories/${id}`, { method:'DELETE' }); showToast('Eliminada'); allItems = await apiFetch('/categories/'); renderList(allItems); }
      catch(e) { showToast(e.detail||'Error','error'); }
    });
  }

  loadAll().catch(() => showToast('Error al cargar','error'));
</script>
</body>
</html>
